# ============================================================================
# STAGE -- INVENTORY-DC (product dispatch; sentqty) -- POINTER ONLY, different family
# ============================================================================
inventory_dc_product_dispatch:
  see: flow/inventory-flow.yml#inventory_dc
  summary_for_this_doc: >
    Products (not spares) follow a completely parallel path off a Sales Order, not a CMS
    Complaint/Indent: entities/inventory-dc, GET api/sales-orders/mapsoproductforinventorydc/{id}
    -> per-line sentqty (0 < sentqty <= qty) -> POST/PUT api/inventory-dcs -> mapInventoryDcProducts.
    Fully documented in flow/inventory-flow.yml. Do not conflate with the spares chain above --
    they share no entities, no endpoints, and no stock table (inventory-dc's product stock is a
    separate mechanism from MapStoreSpares, not covered by this file).

# ============================================================================
# NOTES -- things worth remembering next time a "spare dispatch/stock is wrong" bug shows up
# ============================================================================
notes:
  - "Two unrelated 'dispatch' concepts: (1) sentqty on inventory-dc, product dispatch off a Sales Order (flow/inventory-flow.yml); (2) dispatchQty, the spares field on Work Order/CMS/Estimation fed by Spare-DC saves against a CMS indent. This file only covers (2) and its full surrounding lifecycle."
  - "dispatchQty is a DTO passthrough, not a computed value, on BOTH the frontend (verbatim template interpolation) and backend (WorkOrderService.java:1241-1242 mirrors whatever the last PUT sent, defaulting null to 0). If a user reports 'dispatched qty is wrong,' the bug is most likely a stale/wrong value some earlier PUT echoed back, not a live join against Spare-DC records -- there is no live join anywhere in this codebase."
  - "MapStoreSpares.availableqty is the single real stock number. It has exactly 3 writers: Spare-GRN (+), Spare-DC (-), Spare Stock Adjustment (+/-). Neither GRN cancel nor DC cancel reverses their own stock effect -- cancelling either leaves stock permanently off by the cancelled amount. If stock looks wrong, check for cancelled GRNs/DCs first."
  - "indentStage only ever moves 1 -> 2, only via SpareEstimationService.save (raising a Spare Estimation off the indent). There is no stage for 'fully dispatched,' 'fully used,' or 'closed' beyond that single Estimate transition -- recording usedQty (Stage 5, itself still unmerged) never changes stage at all."
  - "Spare-DC's indent pull is CMS-only (api/complaints/dc-reference) -- there is no confirmed Work-Order-side equivalent, even though dispatchQty is also displayed on the Work Order detail page itself."
  - "domain/SpareIndent.java is an orphaned/legacy entity with its own unused IndentStage field -- don't confuse it with the real Indent entity WorkOrderService and SpareEstimationService operate on."
  - "indent_stage DB rows are not seeded via any liquibase changelog in this repo -- only ids 1 and 2 are referenced anywhere in Java/Angular source, so the full stage vocabulary can't be enumerated from source control alone."
