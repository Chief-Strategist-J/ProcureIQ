  - "rev 1 (2026-07-03): initial pass, derived from a dedicated read-only research pass over purchase-order, purchase-bill, and all their map-*/sibling-CRUD entities, cross-referenced against flow/inventory-flow.yml (PO->GRN, GRN->PB, PB->RMA) and flow/sales-flow.yml (SO->PO normal + buyback) to avoid re-documenting already-covered edges. New findings not present in either sibling file: PO->PB direct path (bypassing GRN, with a stronger typed backward-link than the GRN path), PO->Payable (Supplier Advance) and PB->Payable (Bill Payment) and PB->Debit Note edges into the Finance module, PO's single-step approval mechanism (distinct from the two-step family PB shares with Quote/SO/Billing/Inventory-DC), and confirmation that map-purchase-order-sales-order-buyback/products are dead unrouted scaffolding rather than a real PO-side conversion path."
